name: Stale issues

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been open for 14 days with no activity.
            It will be closed in 7 days unless there is further activity.
          close-issue-message: >
            Closing due to inactivity. Reopen if this is still relevant.
          stale-issue-label: stale
          days-before-stale: 14
          days-before-close: 7
          exempt-issue-labels: 'pinned,bug,help wanted'
          stale-pr-message: ''
          days-before-pr-stale: -1
          days-before-pr-close: -1
