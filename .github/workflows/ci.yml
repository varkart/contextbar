name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pii-scan:
    name: PII scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for personal info in staged files
        run: |
          PATTERNS=(
            "[removed]"
            "varkart\.os@gmail\.com"
          )
          FAIL=0
          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rIiE "$pattern" \
              --include="*.ts" --include="*.tsx" --include="*.rs" \
              --include="*.toml" --include="*.json" --include="*.yml" \
              --include="*.yaml" --include="*.md" --include="*.rb" \
              . 2>/dev/null | grep -v "node_modules" || true)
            if [[ -n "$MATCHES" ]]; then
              echo "BLOCKED: personal info pattern found: $pattern"
              echo "$MATCHES"
              FAIL=1
            fi
          done
          if [[ $FAIL -ne 0 ]]; then exit 1; fi
          echo "PII scan passed."

  frontend:
    name: Frontend — typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and build
        run: npm run build

      - name: Unit tests
        run: npm test

  rust:
    name: Rust — fmt, clippy, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Format check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: src-tauri

      - name: Tests
        run: cargo test
        working-directory: src-tauri
