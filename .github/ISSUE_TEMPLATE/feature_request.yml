name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature ideas and general questions are better suited for [Discussions](../../discussions).
        Use this form only for concrete, actionable feature proposals.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that you can't do today?
      placeholder: "I want to see X but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What should Context Bar do differently?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've tried?

  - type: dropdown
    id: tool
    attributes:
      label: Related AI tool (if specific)
      options:
        - All tools
        - Claude
        - Cursor
        - Gemini
        - GitHub Copilot
        - Windsurf
        - ChatGPT
        - Codex
        - Kiro
        - Other / new tool
