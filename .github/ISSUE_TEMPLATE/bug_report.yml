name: Bug report
description: Something is not working correctly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing: check if a similar issue already exists.

  - type: input
    id: version
    attributes:
      label: Context Bar version
      placeholder: "e.g. v0.9.2 — found in the menu bar popover footer"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. Sequoia 15.3"
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Affected AI tool (if specific)
      placeholder: "e.g. Claude, Cursor, Windsurf — or 'all'"

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open menu bar popover
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      description: Open Console.app and filter by "contextbar", or run from terminal and paste output.
      render: shell
