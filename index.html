<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context Bar</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #09090b;
        transition: opacity 0.15s ease;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      @media (prefers-color-scheme: light) {
        #splash { background: #ffffff; }
        #splash-title { color: #18181b; }
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #splash-logo {
        width: 128px;
        height: 128px;
        object-fit: contain;
        animation: sp-float 3.2s ease-in-out infinite;
      }
      .splash-text-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
        padding-left: 24px;
        padding-right: 24px;
        width: 100%;
      }
      #splash-title {
        font-size: 22px;
        font-weight: 700;
        color: #e4e4e7;
        letter-spacing: -0.02em;
        margin: 0;
      }
      #splash-tip-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 12px;
      }
      .splash-tip-item {
        font-size: 13px;
        color: rgba(167, 139, 250, 0.8);
        margin: 2px 0;
        font-weight: 500;
      }
      #splash-dots {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 32px;
        gap: 8px;
        margin-top: 16px;
      }
      #splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(167, 139, 250, 0.6);
        animation: sp-dot 1.2s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes sp-float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-8px); }
      }
      @keyframes sp-dot {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40%           { opacity: 1;   transform: scale(1); }
      }
      @keyframes sp-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img id="splash-logo" src="/sloth.png" alt="Context Bar" draggable="false" />
      <div class="splash-text-wrap">
        <p id="splash-title">Context Bar</p>
        <div id="splash-tip-container">
          <span style="font-size: 13px; color: #71717a; margin-bottom: 4px;">we are loading, until then</span>
          <div id="splash-tips-list" style="display: flex; flex-direction: column; align-items: center; width: 100%;"></div>
        </div>
      </div>
      <div id="splash-dots"><span></span><span></span><span></span></div>
      <script type="module">
        import { TIPS } from './src/constants/tips.ts';
        var listEl = document.getElementById('splash-tips-list');
        var tipIndex = 0;

        function typeTip() {
          if (!listEl || tipIndex >= TIPS.length) return;

          var fullText = TIPS[tipIndex];
          var charIdx = 0;

          var row = document.createElement('div');
          row.style.display = 'flex';
          row.style.alignItems = 'center';
          row.style.justifyContent = 'center';
          row.style.height = '20px';

          var textSpan = document.createElement('span');
          textSpan.style.fontSize = '13px';
          textSpan.style.color = '#a78bfa';
          textSpan.style.fontWeight = '500';

          var cursorSpan = document.createElement('span');
          cursorSpan.style.display = 'inline-block';
          cursorSpan.style.width = '6px';
          cursorSpan.style.height = '14px';
          cursorSpan.style.backgroundColor = '#a78bfa';
          cursorSpan.style.marginLeft = '4px';
          cursorSpan.style.animation = 'sp-blink 0.8s step-end infinite';

          row.appendChild(textSpan);
          row.appendChild(cursorSpan);
          listEl.appendChild(row);

          function typeChar() {
            if (charIdx < fullText.length) {
              charIdx++;
              textSpan.textContent = fullText.substring(0, charIdx);
              setTimeout(typeChar, 60);
            } else {
              cursorSpan.remove();
              textSpan.style.color = 'rgba(167, 139, 250, 0.8)';
              tipIndex++;
              setTimeout(typeTip, 1500);
            }
          }

          setTimeout(typeChar, 200);
        }

        setTimeout(typeTip, 400);
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
