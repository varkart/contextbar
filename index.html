<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aicontextbar</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 24px;
        background: #09090b;
        z-index: 9999;
        transition: opacity 0.15s ease;
      }
      @media (prefers-color-scheme: light) {
        #splash { background: #ffffff; }
        #splash p { color: #71717a; }
        #splash span { color: #a1a1aa; }
      }
      #splash p {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 12px;
        color: #71717a;
        text-align: center;
        line-height: 1.6;
      }
      #splash span {
        font-size: 10px;
        color: #3f3f46;
        font-family: ui-monospace, monospace;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div id="splash">
      <p>things are loading</p>
      <span>take a small break · rest ur eyes · stretch ur back · have a sip of water</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
