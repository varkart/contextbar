<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Manager</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #09090b;
        transition: opacity 0.15s ease;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      @media (prefers-color-scheme: light) {
        #splash { background: #ffffff; }
        #splash-title { color: #18181b; }
        #splash-tip { color: #71717a; }
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #splash-glow-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #splash-glow {
        position: absolute;
        width: 112px;
        height: 112px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, rgba(139,92,246,0) 70%);
        animation: sp-glow 3.2s ease-in-out infinite;
      }
      #splash-logo {
        position: relative;
        width: 80px;
        height: 80px;
        object-fit: contain;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        animation: sp-float 3.2s ease-in-out infinite;
      }
      #splash-title {
        font-size: 17px;
        font-weight: 600;
        color: #e4e4e7;
        letter-spacing: -0.01em;
      }
      #splash-tip {
        font-size: 13px;
        color: #52525b;
        transition: opacity 0.16s ease;
      }
      #splash-dots {
        display: flex;
        gap: 6px;
      }
      #splash-dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #52525b;
        animation: sp-dot 1.2s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes sp-float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-8px); }
      }
      @keyframes sp-glow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(1.08); }
      }
      @keyframes sp-dot {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40%           { opacity: 1;   transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-glow-wrap">
        <div id="splash-glow"></div>
        <img id="splash-logo" src="/sloth.png" alt="LLM Manager" draggable="false" />
      </div>
      <span id="splash-title">LLM Manager</span>
      <span id="splash-tip">stretch ur back</span>
      <div id="splash-dots"><span></span><span></span><span></span></div>
      <script>
        var tips = ['stretch ur back','rest ur eyes','take a small break','have a sip of water','breathe slowly'];
        var ti = 0;
        setInterval(function() {
          ti = (ti + 1) % tips.length;
          var el = document.getElementById('splash-tip');
          if (el) { el.style.opacity = '0'; setTimeout(function() { if(el){el.textContent = tips[ti]; el.style.opacity = '1';} }, 160); }
        }, 2200);
      </script>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
