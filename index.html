<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Manager</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        background: #09090b;
        transition: opacity 0.15s ease;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      @media (prefers-color-scheme: light) {
        #splash { background: #ffffff; }
        #splash-title { color: #18181b; }
        #splash-tip { color: #71717a; }
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #splash-glow-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #splash-glow {
        position: absolute;
        width: 192px;
        height: 192px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, rgba(139,92,246,0) 70%);
        animation: sp-glow 3.2s ease-in-out infinite;
      }
      #splash-logo {
        position: relative;
        width: 128px;
        height: 128px;
        object-fit: contain;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        animation: sp-float 3.2s ease-in-out infinite;
      }
      .splash-text-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        text-align: center;
        padding-left: 24px;
        padding-right: 24px;
        width: 100%;
        overflow: hidden;
      }
      #splash-title {
        font-size: 22px;
        font-weight: 700;
        color: #e4e4e7;
        letter-spacing: -0.02em;
        margin: 0;
      }
      #splash-tip-container {
        width: 100%;
        overflow: hidden;
        position: relative;
        height: 20px;
      }
      #splash-tip {
        font-size: 14px;
        color: #52525b;
        margin: 0;
        white-space: nowrap;
        position: absolute;
        transform: translateX(100vw);
        animation: sp-scroll 7s linear forwards;
      }
      #splash-dots {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        gap: 8px;
      }
      #splash-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(167, 139, 250, 0.6);
        animation: sp-dot 1.2s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes sp-float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-8px); }
      }
      @keyframes sp-glow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(1.08); }
      }
      @keyframes sp-dot {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40%           { opacity: 1;   transform: scale(1); }
      }
      @keyframes sp-scroll {
        0% { transform: translateX(100vw); }
        100% { transform: translateX(-100%); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-glow-wrap">
        <div id="splash-glow"></div>
        <img id="splash-logo" src="/sloth.png" alt="LLM Manager" draggable="false" />
      </div>
      <div class="splash-text-wrap">
        <p id="splash-title">LLM Manager</p>
        <div id="splash-tip-container">
          <p id="splash-tip">take a small break &nbsp;&bull;&nbsp; rest ur eyes &nbsp;&bull;&nbsp; stretch ur back &nbsp;&bull;&nbsp; have a sip of water &nbsp;&bull;&nbsp; breathe slowly</p>
        </div>
      </div>
      <div id="splash-dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
