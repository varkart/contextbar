<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Manager</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #09090b; }
      @media (prefers-color-scheme: light) { body { background: #ffffff; } }

      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #09090b;
        transition: opacity 0.2s ease;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      @media (prefers-color-scheme: light) {
        #splash { background: #ffffff; }
        #splash-title { color: #18181b; }
        #splash-tip { color: #71717a; }
        #splash-continue { color: #8b5cf6; background: rgba(139,92,246,0.08); }
        #splash-continue:hover { background: rgba(139,92,246,0.15); }
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #splash-glow-wrap {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #splash-glow {
        position: absolute;
        width: 112px;
        height: 112px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(139,92,246,0.35) 0%, rgba(139,92,246,0) 70%);
        animation: splash-glow 3.2s ease-in-out infinite;
      }
      #splash-logo {
        position: relative;
        width: 80px;
        height: 80px;
        object-fit: contain;
        filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
        animation: splash-float 3.2s ease-in-out infinite;
      }

      #splash-text {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      #splash-title {
        font-size: 17px;
        font-weight: 600;
        color: #e4e4e7;
        letter-spacing: -0.01em;
      }
      #splash-tip {
        font-size: 13px;
        color: #52525b;
        transition: opacity 0.3s ease;
      }

      #splash-dots {
        display: flex;
        gap: 6px;
      }
      #splash-dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: #52525b;
        animation: splash-dot-pulse 1.2s ease-in-out infinite;
      }
      #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.4s; }

      #splash-continue {
        display: none;
        margin-top: 4px;
        padding: 6px 16px;
        font-size: 13px;
        font-weight: 500;
        color: #a78bfa;
        background: rgba(139,92,246,0.1);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-family: inherit;
        transition: background 0.15s;
        animation: splash-fade-in 0.3s ease-out forwards;
      }
      #splash-continue:hover { background: rgba(139,92,246,0.18); }

      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-8px); }
      }
      @keyframes splash-glow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(1.08); }
      }
      @keyframes splash-dot-pulse {
        0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
        40%           { opacity: 1;   transform: scale(1); }
      }
      @keyframes splash-fade-in {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-glow-wrap">
        <div id="splash-glow"></div>
        <img id="splash-logo" src="/sloth.png" alt="LLM Manager" draggable="false" />
      </div>
      <div id="splash-text">
        <span id="splash-title">LLM Manager</span>
        <span id="splash-tip">stretch ur back</span>
      </div>
      <div id="splash-dots">
        <span></span><span></span><span></span>
      </div>
      <button id="splash-continue" onclick="dismissSplash()">Continue</button>
    </div>
    <div id="root"></div>
    <script>
      // Cycle tips immediately, no framework needed
      var tips = ['stretch ur back','rest ur eyes','take a small break','have a sip of water','breathe slowly'];
      var ti = 0;
      setInterval(function() {
        ti = (ti + 1) % tips.length;
        var el = document.getElementById('splash-tip');
        if (el) { el.style.opacity = '0'; setTimeout(function() { el.textContent = tips[ti]; el.style.opacity = '1'; }, 160); }
      }, 2200);

      function dismissSplash() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('fade-out'); setTimeout(function() { s.remove(); }, 220); }
      }

      // React will call this once backend is ready to show the Continue button
      window.__splashShowContinue = function() {
        var dots = document.getElementById('splash-dots');
        var btn = document.getElementById('splash-continue');
        if (dots) dots.style.display = 'none';
        if (btn) btn.style.display = 'block';
      };

      // React's existing fade-out hook still works
      document.addEventListener('DOMContentLoaded', function() {
        // fade-out class added by App.tsx useEffect triggers CSS transition
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
