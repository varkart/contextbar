<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Manager</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 32px;
        background: #09090b;
        z-index: 9999;
        transition: opacity 0.2s ease;
      }
      @media (prefers-color-scheme: light) {
        #splash { background: #fafafa; }
        #splash .splash-title { color: #18181b; }
        #splash .splash-tip { color: #52525b; }
      }
      #splash .splash-title {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 17px;
        font-weight: 600;
        color: #e4e4e7;
        text-align: center;
        letter-spacing: -0.01em;
      }
      #splash .splash-tips {
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }
      #splash .splash-tip {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        color: #71717a;
        text-align: center;
        line-height: 1.4;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <div id="splash">
      <p class="splash-title">things are loading</p>
      <div class="splash-tips">
        <p class="splash-tip">take a small break</p>
        <p class="splash-tip">rest ur eyes</p>
        <p class="splash-tip">stretch ur back</p>
        <p class="splash-tip">have a sip of water</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
