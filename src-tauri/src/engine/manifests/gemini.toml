schema_version = 1
id = "gemini"
name = "Gemini CLI"

[[detection]]
type = "dir"
path = "~/.gemini"

[[detection]]
type = "binary"
name = "gemini"

[version]
type = "command"
binary = "gemini"
args = ["--version"]
timeout_ms = 800
parse = "first_line"

# Third-party MCPs from settings.json (JSONC — supports // comments)
# Disabled state tracked separately in mcp-server-enablement.json
[[mcp_sources]]
id = "settings_json"
type = "json_key_pair"
file = "~/.gemini/settings.json"
active_key = "mcpServers"
disabled_key = "disabledMcpServers"
jsonc = true

# Built-in extensions from ~/.gemini/extensions/
[[mcp_sources]]
id = "extensions"
type = "extension_dir"
dir = "~/.gemini/extensions"
manifest_file = "gemini-extension.json"
enablement_file = "~/.gemini/extensions/extension-enablement.json"
extension_path_var = "${extensionPath}"

# User skills — ~/.agents/skills/ (higher precedence alias)
[[skill_sources]]
id = "agents_skills_dir"
type = "directory"
path = "~/.agents/skills"
disabled_subdir = ".disabled"

# User skills — ~/.gemini/skills/ (primary path)
[[skill_sources]]
id = "skills_dir"
type = "directory"
path = "~/.gemini/skills"
disabled_subdir = ".disabled"

[permissions]
file = "~/.gemini/settings.json"
key = "tools"
allow_key = "allowed"
deny_key = "exclude"
