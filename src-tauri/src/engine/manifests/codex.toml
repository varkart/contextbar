schema_version = 1
id = "codex"
name = "Codex CLI"

[[detection]]
type = "binary"
name = "codex"

[[detection]]
type = "file"
path = "~/.codex/config.toml"

[version]
type = "command"
args = ["--version"]
timeout_ms = 800
parse = "first_token"

[[skill_sources]]
id = "agents_skills_dir"
type = "toml_config_directory"
path = "~/.agents/skills"
config_file = "~/.codex/config.toml"
config_key_path = ["skills", "config"]
path_field = "path"
enabled_field = "enabled"

# MCP servers defined in [mcp_servers] TOML table
[[mcp_sources]]
id = "config_toml"
type = "toml_key_pair"
file = "~/.codex/config.toml"
active_key = "mcp_servers"
inline_toggle_field = "enabled"
