schema_version = 1
id = "windsurf"
name = "Windsurf"

[[detection]]
type = "file"
path = "~/.codeium/windsurf/bin/windsurf"

[version]
type = "json_key"
file = "~/.windsurf/argv.json"
key_path = ["version"]

[[mcp_sources]]
type = "json_nested"
file = "~/Library/Application Support/Windsurf/User/settings.json"
key_path = ["mcp", "servers"]
jsonc = true
