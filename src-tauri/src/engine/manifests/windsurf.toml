schema_version = 1
id = "windsurf"
name = "Windsurf"

[[detection]]
type = "file"
path = "~/.codeium/windsurf/bin/windsurf"

[version]
type = "json_key"
file = "~/.windsurf/argv.json"
key_path = ["version"]

[[mcp_sources]]
id = "mcp_config"
type = "json_key_pair"
file = "~/.codeium/windsurf/mcp_config.json"
active_key = "mcpServers"
