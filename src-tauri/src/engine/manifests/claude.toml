schema_version = 1
id = "claude"
name = "Claude Code"

[[detection]]
type = "dir"
path = "~/.claude"

[version]
type = "command"
binary = "claude"
args = ["--version"]
timeout_ms = 1500
parse = "first_token"

[[mcp_sources]]
type = "json_key_pair"
file = "~/.claude/settings.json"
active_key = "mcpServers"
disabled_key = "disabledMcpServers"

[[mcp_sources]]
type = "claude_plugins"
installed_plugins_file = "~/.claude/plugins/installed_plugins.json"
mcp_filename = ".mcp.json"

[[mcp_sources]]
type = "claude_dotfile"
file = "~/.claude.json"

[[mcp_sources]]
type = "claude_mcp_list"
binary = "claude"
timeout_ms = 6000

[[skill_sources]]
type = "directory"
path = "~/.claude/skills"
disabled_subdir = ".disabled"
