schema_version = 1
id = "agy"
name = "Antigravity CLI"

[[detection]]
type = "dir"
path = "~/.gemini/antigravity-cli"

[[detection]]
type = "binary"
name = "agy"

[version]
type = "command"
binary = "agy"
args = ["--version"]
timeout_ms = 800
parse = "first_line"

# MCPs added via settings.json (writable — supports Add/Remove MCP)
[[mcp_sources]]
id = "settings_json"
type = "json_key_pair"
file = "~/.gemini/antigravity-cli/settings.json"
active_key = "mcpServers"
disabled_key = "disabledMcpServers"

# MCPs from plugins (gemini-extension.json format — same schema as Gemini extensions, read-only)
[[mcp_sources]]
id = "plugins"
type = "extension_dir"
dir = "~/.gemini/antigravity-cli/plugins"
manifest_file = "gemini-extension.json"

# User skills (global)
[[skill_sources]]
id = "skills_dir"
type = "directory"
path = "~/.gemini/antigravity-cli/skills"
disabled_subdir = ".disabled"

# Shared skills (~/.gemini/skills/ — agy's "Shared" path)
[[skill_sources]]
id = "shared_skills"
type = "directory"
path = "~/.gemini/skills"
disabled_subdir = ".disabled"

# Built-in skills (read-only bundled skills)
[[skill_sources]]
id = "builtin_skills"
type = "directory"
path = "~/.gemini/antigravity-cli/builtin/skills"

[permissions]
file = "~/.gemini/antigravity-cli/settings.json"
key = "permissions"
