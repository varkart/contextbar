schema_version = 1
id = "agy"
name = "Antigravity CLI"

[[detection]]
type = "dir"
path = "~/.gemini/antigravity-cli"

[[detection]]
type = "binary"
name = "agy"

[version]
type = "command"
binary = "agy"
args = ["--version"]
timeout_ms = 800
parse = "first_line"

# MCPs from plugins (gemini-extension.json format — same schema as Gemini extensions)
[[mcp_sources]]
id = "plugins"
type = "extension_dir"
dir = "~/.gemini/antigravity-cli/plugins"
manifest_file = "gemini-extension.json"

# Skills from shared ~/.agents/skills/
[[skill_sources]]
id = "agents_skills_dir"
type = "directory"
path = "~/.agents/skills"
disabled_subdir = ".disabled"

# Native skills from ~/.gemini/antigravity-cli/skills/
[[skill_sources]]
id = "skills_dir"
type = "directory"
path = "~/.gemini/antigravity-cli/skills"
disabled_subdir = ".disabled"

[permissions]
file = "~/.gemini/antigravity-cli/settings.json"
key = "permissions"
